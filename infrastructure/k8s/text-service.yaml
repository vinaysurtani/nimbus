apiVersion: apps/v1
kind: Deployment
metadata:
  name: text-service
  namespace: nimbus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: text-service
  template:
    metadata:
      labels:
        app: text-service
    spec:
      containers:
      - name: text-service
        image: nimbus/text-service:latest
        ports:
        - containerPort: 8001
        - containerPort: 50051
        env:
        - name: PORT
          value: "8001"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: text-service
  namespace: nimbus
spec:
  selector:
    app: text-service
  ports:
  - name: http
    port: 8001
    targetPort: 8001
  - name: grpc
    port: 50051
    targetPort: 50051