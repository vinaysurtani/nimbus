apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: nimbus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      containers:
      - name: rag-service
        image: ghcr.io/vinaysurtani/nimbus-rag-service:latest
        ports:
        - containerPort: 8004
        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: nimbus-secrets
              key: anthropic-api-key
        - name: QDRANT_HOST
          value: qdrant
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: nimbus
spec:
  selector:
    app: rag-service
  ports:
  - port: 8004
    targetPort: 8004
