syntax = "proto3";

package image_service;

service ImageProcessor {
    rpc ProcessImage(ImageRequest) returns (ImageResponse);
    rpc GetImageInfo(ImageRequest) returns (ImageInfoResponse);
}

message ImageRequest {
    bytes image_data = 1;
    string format = 2;
}

message ImageResponse {
    bytes processed_image = 1;
    string format = 2;
    int32 width = 3;
    int32 height = 4;
}

message ImageInfoResponse {
    string format = 1;
    int32 width = 2;
    int32 height = 3;
    string mode = 4;
    int64 size_bytes = 5;
}